<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>HEALINK - Smart Student Wellness</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes fadeUp {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
.fadeUp {
  animation: fadeUp 0.8s ease;
}
</style>

</head>

<body class="bg-gradient-to-br from-purple-700 via-purple-600 to-blue-600 min-h-screen text-white flex flex-col">

<!-- HEADER -->
<div class="flex justify-between items-center px-6 py-4 bg-white/10 backdrop-blur">

  <h1 class="font-bold text-lg">💜 HEALINK</h1>

  <span class="text-sm opacity-80">
    Smart Student Wellness System
  </span>

</div>

<!-- HERO -->
<div class="flex-1 flex items-center justify-center">

  <div class="text-center fadeUp">

    <h1 class="text-4xl md:text-5xl font-bold mb-4">
      HEALINK
    </h1>

    <p class="text-lg opacity-90 mb-8">
      Digital Guidance & Counseling Platform
    </p>

    <!-- LOGIN BOX -->
    <div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl w-[320px] mx-auto shadow-xl">

      <input id="nama" type="text" placeholder="Nama"
        class="w-full mb-3 p-2 rounded text-black">

      <input id="kelas" type="text" placeholder="Kelas"
        class="w-full mb-3 p-2 rounded text-black">

      <select id="jenis" class="w-full mb-4 p-2 rounded text-black">
        <option value="murid">Murid</option>
        <option value="guru">Guru</option>
      </select>

      <button onclick="login()"
        class="w-full bg-green-500 hover:bg-green-600 py-2 rounded font-semibold">
        🚀 Masuk HEALINK
      </button>

    </div>

  </div>

</div>

<!-- FOOTER -->
<div class="text-center text-sm py-3 bg-white/10">
  © HEALINK 2026 | PTIS Baling
</div>

<script>

function login(){

  const nama = document.getElementById("nama").value;
  const kelas = document.getElementById("kelas").value;
  const jenis = document.getElementById("jenis").value;

  if(!nama || !kelas){
    alert("Sila isi semua maklumat");
    return;
  }

  // simpan session
  sessionStorage.setItem("nama", nama);
  sessionStorage.setItem("kelas", kelas);
  sessionStorage.setItem("jenis", jenis);

  // pergi ke healink
  window.location.href = "./healink.html";

}

</script>

</body>
</html>
