<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Daftar Pengunjung</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen flex items-center justify-center text-white">

<div class="bg-white/10 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-white/20 w-[90%] max-w-md mx-auto">

  <!-- HEADER -->
  <div class="text-center mb-6">

    <h2 class="text-2xl font-bold">
      🧠 HEALINK 2.0
    </h2>

    <p class="text-white/70 text-sm mt-1">
      Ekosistem Kesejahteraan Minda
    </p>

    <div class="mt-3 inline-block bg-green-400 text-black px-3 py-1 rounded-full text-xs font-semibold">
      🚀 Versi Baharu
    </div>

  </div>

  <form id="formDaftar">

    <!-- JENIS -->
    <p class="mb-3 text-white/90 text-sm">Jenis Pengunjung:</p>

    <!-- 🔥 FIX GRID -->
    <div class="grid grid-cols-2 gap-3 mb-4">

  <button type="button" onclick="selectJenis('Murid')" id="btnMurid"
    class="btnJenis ripple">🎒 Murid</button>

  <button type="button" onclick="selectJenis('Guru')" id="btnGuru"
    class="btnJenis ripple">👨‍🏫 Guru</button>

  <button type="button" onclick="selectJenis('Pelawat')" id="btnPelawat"
    class="btnJenis ripple">👤 Pelawat</button>

  <button type="button" onclick="selectJenis('Admin')" id="btnAdmin"
    class="btnJenis ripple">🛠️ Admin</button>

</div>

<!-- 🔥 SATU SAHAJA -->
<div id="jenisBox" class="mt-4 mb-4 text-center opacity-0 scale-95 transition duration-300">

  <span class="bg-green-400/20 text-green-200 px-4 py-2 rounded-full text-sm font-semibold shadow">
    ✔ Dipilih: <span id="jenisText"></span>
  </span>

</div>

    <!-- INPUT -->
    <input id="nama" type="text" placeholder="Nama" class="inputBox">

    <input id="organisasi" type="text" placeholder="Sekolah / Organisasi" class="inputBox">

    <!-- 🔥 BUNGKUS KELAS -->
    <div id="kelasBox">
      <input id="kelas" type="text" placeholder="Kelas (contoh: 5 Bestari)" class="inputBox">
    </div>

    <!-- 🔥 STEP 4.1 LETAK DI SINI -->
    <p id="hintText" 
   class="text-sm mt-4 mb-4 text-center font-semibold tracking-wide 
          bg-white/10 px-4 py-2 rounded-xl backdrop-blur">
</p>

    <!-- BUTTON -->
    <button type="submit" class="btnMain">
      ✨ Daftar Sekarang
    </button>

  </form>

</div>

<style>
.inputBox {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  color: black;
  font-size: 14px;
}

.btnJenis {
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.15);
  transition: 0.3s;
  font-size: 14px;
  border: 2px solid transparent;
}

.btnJenis:hover {
  background: rgba(255,255,255,0.3);
  transform: scale(1.03);
}

/* 🔥 ACTIVE STATE */
.btnActive {
  transform: scale(1.05);
  border: 2px solid white;
  box-shadow: 0 0 15px rgba(255,255,255,0.6);
  color: black;
}

.btnMain {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  font-weight: bold;
  background: linear-gradient(to right, #9333ea, #3b82f6);
  transition: 0.3s;
}

.btnMain:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(168,85,247,0.4);
}

/* RIPPLE EFFECT */
.ripple {
  position: relative;
  overflow: hidden;
}

.ripple span {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  animation: rippleEffect 600ms linear;
  background: rgba(255,255,255,0.6);
}

@keyframes rippleEffect {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

.inputFocus {
  outline: none;
  box-shadow: 0 0 15px rgba(59,130,246,0.6);
  border: 2px solid #3b82f6;
}
</style>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA9R5jKqeJNvBHD-SIOuseAqyb_x909R3Q",
  authDomain: "bimbingankaunselingskkk.firebaseapp.com",
  projectId: "bimbingankaunselingskkk"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let jenisDipilih = "";

// PILIH JENIS
function selectJenis(jenis){
  jenisDipilih = jenis;

  document.querySelectorAll("#btnMurid, #btnGuru, #btnPelawat, #btnAdmin")
    .forEach(btn => btn.classList.remove(
      "bg-green-400","bg-blue-400","bg-yellow-400","bg-red-400"
    ));

  if(jenis === "Murid") btnMurid.classList.add("bg-green-400");
  if(jenis === "Guru") btnGuru.classList.add("bg-blue-400");
  if(jenis === "Pelawat") btnPelawat.classList.add("bg-yellow-400");

  if(jenis === "Admin"){
    btnAdmin.classList.add("bg-red-400");
    window.location.href = "login.html";
    return;
  }

  const kelasField = document.getElementById("kelas");

  if(jenis === "Guru" || jenis === "Pelawat"){
    kelasField.style.display = "none";
  } else {
    kelasField.style.display = "block";
  }

  // 🎯 AUTO SCROLL & FOCUS
  setTimeout(() => {
  document.getElementById("nama").scrollIntoView({
    behavior: "smooth",
    block: "center"
  });

  document.getElementById("nama").focus();

}, 200);
}

// SUBMIT
document.getElementById("formDaftar").addEventListener("submit", function(e){
  e.preventDefault();

  const jenis = jenisDipilih;
  const nama = document.getElementById("nama").value.trim();
  const organisasi = document.getElementById("organisasi").value.trim();
  const kelas = document.getElementById("kelas").value.trim();

  // VALIDATION
  if(!jenis){
    alert("Sila pilih jenis pengguna");
    return;
  }

  if(!nama){
    alert("Sila isi nama");
    return;
  }

  if(jenis === "Murid"){
    if(!organisasi || !kelas){
      alert("Murid wajib isi Sekolah dan Kelas");
      return;
    }
  }

  if(jenis === "Guru" || jenis === "Pelawat"){
    if(!organisasi){
      alert("Sila isi Sekolah / Organisasi");
      return;
    }
  }

  // 🔥 FIREBASE SAHAJA
  db.collection("pengunjung").add({
    jenis,
    nama,
    organisasi,
    kelas,
    masa: new Date()
  })
  .then(() => {

    // 🔥 SIMPAN SESSION
    sessionStorage.setItem("sudahDaftar","yes");
    sessionStorage.setItem("nama", nama);
    sessionStorage.setItem("jenis", jenis);
    sessionStorage.setItem("kelas", kelas);
    sessionStorage.setItem("organisasi", organisasi);

    alert("✅ Data berjaya direkod!");

    // 🔥 REDIRECT
    window.location.href = "healink.html";

  })
  .catch(err => {

    console.error("ERROR:", err);

    alert("❌ Ralat simpan data");

  });

});

function selectJenis(jenis){

  // 🔥 UPDATE TEXT
  document.getElementById("jenisText").innerText = jenis;

  // 🔥 SHOW BOX
  const box = document.getElementById("jenisBox");
  box.classList.remove("opacity-0","scale-95");
  box.classList.add("opacity-100","scale-100");

  // 🔥 AUTO SCROLL & FOCUS
  setTimeout(() => {
    document.getElementById("nama").scrollIntoView({
      behavior: "smooth",
      block: "center"
    });

    document.getElementById("nama").focus();
  }, 200);

  // 🔥 SAVE SESSION
  sessionStorage.setItem("jenisDipilih", jenis);

  // =========================
  // 🔥 STEP 4.2 (BETUL DI SINI)
  // =========================
  let hint = "";

  if(jenis === "Murid"){
    hint = "Sila isi nama, sekolah dan kelas";
  }
  else if(jenis === "Guru"){
    hint = "Sila isi nama dan sekolah";
  }
  else if(jenis === "Pelawat"){
    hint = "Sila isi nama dan organisasi sahaja";
  }

  document.getElementById("hintText").innerText = hint;

  // =========================
  // 🔥 STEP 5.1 (LETak SINI)
  // =========================
  document.getElementById("nama").value = "";
  document.getElementById("organisasi").value = "";
  document.getElementById("kelas").value = "";

}

document.querySelectorAll(".ripple").forEach(btn => {

  btn.addEventListener("click", function(e){

    const circle = document.createElement("span");

    const diameter = Math.max(this.clientWidth, this.clientHeight);
    const radius = diameter / 2;

    circle.style.width = circle.style.height = `${diameter}px`;
    circle.style.left = `${e.clientX - this.offsetLeft - radius}px`;
    circle.style.top = `${e.clientY - this.offsetTop - radius}px`;

    this.appendChild(circle);

    setTimeout(() => circle.remove(), 600);

  });

});

window.onload = function(){

  const saved = sessionStorage.getItem("jenisDipilih");

  if(saved){
    selectJenis(saved);
  }

}

const namaInput = document.getElementById("nama");

namaInput.classList.add("inputFocus");

setTimeout(() => {
  namaInput.classList.remove("inputFocus");
}, 1500);

</script>

</body>
</html>
