<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Daftar Pengunjung</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen flex items-center justify-center text-white">

<div class="bg-white/10 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-white/20 w-[90%] max-w-md mx-auto">

  <!-- HEADER -->
  <div class="text-center mb-6">

    <h2 class="text-2xl font-bold">
      🧠 HEALINK 2.0
    </h2>

    <p class="text-white/70 text-sm mt-1">
      Ekosistem Kesejahteraan Minda
    </p>

    <div class="mt-3 inline-block bg-green-400 text-black px-3 py-1 rounded-full text-xs font-semibold">
      🚀 Versi Baharu
    </div>

  </div>

  <form id="formDaftar">

    <!-- JENIS -->
    <p class="mb-3 text-white/90 text-sm">Jenis Pengunjung:</p>

    <!-- 🔥 FIX GRID -->
    <div class="grid grid-cols-2 gap-3 mb-6">

      <button type="button" onclick="selectJenis('Murid')" id="btnMurid"
        class="btnJenis">🎒 Murid</button>

      <button type="button" onclick="selectJenis('Guru')" id="btnGuru"
        class="btnJenis">👨‍🏫 Guru</button>

      <button type="button" onclick="selectJenis('Pelawat')" id="btnPelawat"
        class="btnJenis">👤 Pelawat</button>

      <button type="button" onclick="selectJenis('Admin')" id="btnAdmin"
        class="btnJenis">🛠️ Admin</button>

    </div>

    <!-- INPUT -->
    <input id="nama" type="text" placeholder="Nama" class="inputBox">

    <input id="organisasi" type="text" placeholder="Sekolah / Organisasi" class="inputBox">

    <input id="kelas" type="text" placeholder="Kelas (contoh: 5 Bestari)" class="inputBox">

    <!-- BUTTON -->
    <button type="submit" class="btnMain">
      ✨ Daftar Sekarang
    </button>

  </form>

</div>

<style>
.inputBox {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  color: black;
  font-size: 14px;
}

.btnJenis {
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.15);
  transition: 0.3s;
  font-size: 14px;
}

.btnJenis:hover {
  background: rgba(255,255,255,0.3);
  transform: scale(1.03);
}

.btnMain {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  font-weight: bold;
  background: linear-gradient(to right, #9333ea, #3b82f6);
  transition: 0.3s;
}

.btnMain:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(168,85,247,0.4);
}
</style>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA9R5jKqeJNvBHD-SIOuseAqyb_x909R3Q",
  authDomain: "bimbingankaunselingskkk.firebaseapp.com",
  projectId: "bimbingankaunselingskkk"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let jenisDipilih = "";

// PILIH JENIS
function selectJenis(jenis){
  jenisDipilih = jenis;

  document.querySelectorAll("#btnMurid, #btnGuru, #btnPelawat, #btnAdmin")
    .forEach(btn => btn.classList.remove(
      "bg-green-400","bg-blue-400","bg-yellow-400","bg-red-400"
    ));

  if(jenis === "Murid") btnMurid.classList.add("bg-green-400");
  if(jenis === "Guru") btnGuru.classList.add("bg-blue-400");
  if(jenis === "Pelawat") btnPelawat.classList.add("bg-yellow-400");

  if(jenis === "Admin"){
    btnAdmin.classList.add("bg-red-400");
    window.location.href = "login.html";
    return;
  }

  const kelasField = document.getElementById("kelas");

  if(jenis === "Guru" || jenis === "Pelawat"){
    kelasField.style.display = "none";
  } else {
    kelasField.style.display = "block";
  }
}

// SUBMIT
document.getElementById("formDaftar").addEventListener("submit", function(e){
  e.preventDefault();

  const jenis = jenisDipilih;
  const nama = document.getElementById("nama").value.trim();
  const organisasi = document.getElementById("organisasi").value.trim();
  const kelas = document.getElementById("kelas").value.trim();

  // VALIDATION
  if(!jenis){
    alert("Sila pilih jenis pengguna");
    return;
  }

  if(!nama){
    alert("Sila isi nama");
    return;
  }

  if(jenis === "Murid"){
    if(!organisasi || !kelas){
      alert("Murid wajib isi Sekolah dan Kelas");
      return;
    }
  }

  if(jenis === "Guru" || jenis === "Pelawat"){
    if(!organisasi){
      alert("Sila isi Sekolah / Organisasi");
      return;
    }
  }

  // 🔥 FIREBASE SAHAJA
  db.collection("pengunjung").add({
    jenis,
    nama,
    organisasi,
    kelas,
    masa: new Date()
  })
  .then(() => {

    // 🔥 SIMPAN SESSION
    sessionStorage.setItem("sudahDaftar","yes");
    sessionStorage.setItem("nama", nama);
    sessionStorage.setItem("jenis", jenis);
    sessionStorage.setItem("kelas", kelas);
    sessionStorage.setItem("organisasi", organisasi);

    alert("✅ Data berjaya direkod!");

    // 🔥 REDIRECT
    window.location.href = "healink.html";

  })
  .catch(err => {

    console.error("ERROR:", err);

    alert("❌ Ralat simpan data");

  });

});

function selectJenis(jenis){

  document.querySelectorAll(".btnJenis").forEach(btn=>{
    btn.classList.remove("bg-green-400","bg-blue-400","bg-yellow-400","bg-red-400","text-black");
  });

  if(jenis === "Murid") btnMurid.classList.add("bg-green-400","text-black");
  if(jenis === "Guru") btnGuru.classList.add("bg-blue-400","text-black");
  if(jenis === "Pelawat") btnPelawat.classList.add("bg-yellow-400","text-black");

  if(jenis === "Admin"){
    btnAdmin.classList.add("bg-red-400","text-black");
    window.location.href = "login.html";
  }

}

</script>

</body>
</html>
