<html lang="ms">
<head>

<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen flex items-center justify-center text-white">

<div class="bg-white text-gray-800 p-8 rounded-xl text-center">

<h1 class="text-xl font-bold mb-4">🧩 Jigsaw Puzzle</h1>

<p class="mb-4">Susun nombor dengan betul</p>

<div id="grid" class="grid grid-cols-3 gap-2 mb-4"></div>

<button onclick="shuffle()" class="px-4 py-2 bg-purple-600 text-white rounded">
🔀 Shuffle
</button>

<p id="status" class="mt-3"></p>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

  authDomain: "bimbingankaunselingskkk.firebaseapp.com",

const db = firebase.firestore();

<script>

function trackAktiviti(namaAktiviti){

  const nama = sessionStorage.getItem("nama") || "Unknown";
  const kelas = sessionStorage.getItem("kelas") || "-";
  const sekolah = sessionStorage.getItem("organisasi") || "-";
  const jenis = sessionStorage.getItem("jenis") || "-";

  db.collection("aktivitiPelajar").add({
    nama,
    kelas,
    sekolah,
    jenis,
    aktiviti: namaAktiviti,
    masa: new Date()
  })
  .then(() => console.log("Aktiviti direkod:", namaAktiviti))
  .catch(err => console.error(err));

}
let arr = [1,2,3,4,5,6,7,8,""];

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  arr.forEach((n,i)=>{
    const div = document.createElement("div");

    div.className="w-16 h-16 bg-blue-200 flex items-center justify-center text-xl cursor-pointer";

    div.innerText = n;

    div.onclick = ()=>move(i);

    grid.appendChild(div);
  });
}

function move(i){
  const empty = arr.indexOf("");

  const row = Math.floor(i / 3);
  const col = i % 3;

  const emptyRow = Math.floor(empty / 3);
  const emptyCol = empty % 3;

  if(
    (row === emptyRow && Math.abs(col - emptyCol) === 1) ||
    (col === emptyCol && Math.abs(row - emptyRow) === 1)
  ){
    [arr[i],arr[empty]]=[arr[empty],arr[i]];
    render();
    check();
  }
}

function shuffle(){
  arr.sort(()=>0.5-Math.random());
  render();
}

function check(){
  if(arr.join()=="1,2,3,4,5,6,7,8,"){
    document.getElementById("status").innerText="🎉 Selesai!";
  }
}

render();

trackAktiviti("Jigsaw Puzzle");
</script>

<script>

</script>

</div>
